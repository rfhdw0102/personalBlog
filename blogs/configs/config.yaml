  port: 587
  username: "2129905621@qq.com"
  password: "koptculidhqpdcjb"

# CORS 配置
cors:
  enabled: true
  allow_origins:
    - "*"
  allow_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allow_headers:
