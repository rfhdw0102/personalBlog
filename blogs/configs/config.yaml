# 应用配置
app:
  name: "blogs"
  version: "1.0.0"
  mode: "debug"
  port: 8082

# 数据库配置
database:
  mysql:
    host: "localhost"
    port: 3306
    username: "root"
    password: "995812"
    database: "blogs"
    max_idle_conns: 10
    max_open_conns: 100
  redis:
    host: "localhost"
    port: 6379
    password: ""
    db: 2
    pool_size: 10

# 日志配置
log:
  level: "debug"  # debug, info, warn, error
  filename: "logs/app.log"
  max_size: 100    # MB
  max_backups: 3   # 保留旧文件的最大个数
  max_age: 28      # 保留旧文件的最大天数
  compress: true   # 是否压缩

# JWT 配置
jwt:
  secret: "your-jwt-secret-key-change-in-production"
  expire_hours: 24

#邮箱配置
